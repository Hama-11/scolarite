openapi: 3.0.3
info:
  title: Scolarite API
  version: 2.0.0
  description: Core documented endpoints for modernization roadmap.
servers:
  - url: /api
paths:
  /v2/enrollment/requests:
    post:
      summary: Submit enrollment request with automatic checks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, course_id]
              properties:
                student_id: { type: integer }
                course_id: { type: integer }
                academic_year_id: { type: integer }
                enrollment_window_id: { type: integer }
      responses:
        '201':
          description: Enrollment request created
  /v2/schedules/optimize:
    post:
      summary: Generate optimized schedule proposal
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Optimization proposal computed
  /v2/exams/sessions/{sessionId}/pv:
    post:
      summary: Generate official PV with e-sign metadata
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: PV generated
  /v2/integration/exports:
    post:
      summary: Export data in CSV/JSON/XML
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Export generated
  /v2/forms/dynamic:
    post:
      summary: Create a dynamic form definition
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Form created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
